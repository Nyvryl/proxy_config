port: 7890 # HTTP(S) 代理服务器端口
socks-port: 7891 # SOCKS5 代理端口
mixed-port: 7892 # HTTP(S) 和 SOCKS 代理混合端口
redir-port: 7893 # 透明代理端口，仅代理 TCP 流量，用于 Linux 和 MacOS
tproxy-port: 7894 # 透明代理端口，可代理 TCP 与 UDP 流量，用于 Linux

mode: rule
log-level: warning
ipv6: false
allow-lan: true
bind-address: "*"
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 15
find-process-mode: strict
unified-delay: true # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
profile:
  store-selected: true
  # 储存 API 对策略组的选择，以供下次启动时使用
  store-fake-ip: true
  # 储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: # DNS 劫持，将匹配到的连接导入内部的 DNS 模块
    - any:53
    - tcp://any:53

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:fake-ip-filter"
  prefer-h3: false
  default-nameserver: #用来解析「DNS 服务器域名」的 DNS
    - 223.5.5.5
  proxy-server-nameserver: # 用来解析「代理服务器域名」，防止 nameserver 无法访问导致连不上代理
    - 223.5.5.5
  direct-nameserver: # 「直连」域名的解析，这里用了 DoH 来防止劫持
    - "https://doh.pub/dns-query"
    - "https://223.5.5.5/dns-query"
    - "https://doh.360.cn/dns-query"
  nameserver: # 用来解析没有匹配到任何「域名规则」的域名，通常是国外域名
    - "https:/8.8.8.8/dns-query#PROXY&ecs=120.76.0.0/14&ecs-override=true"

domain_rule: &domain_rule
  type: http
  behavior: domain
  format: text
  interval: 86400

proxy-groups:
  - { name: "🚀 General", type: select, proxies: [♻️ Hong Kong, 🌏 All] }
  - { name: "🤖 AIGC", type: select, proxies: [🏠 Residential] }
  - {
      name: ♻️ Hong Kong,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?i)hk|hong kong|hongkong|🇭🇰",
    }
  - {
      name: 🏠 Residential,
      type: select,
      include-all: true,
      filter: "(?i)家宽|Home",
    }
  - { name: 🌏 All, type: select, include-all: true }

rule-providers:
  reject-list:
    <<: *domain_rule
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/reject-list.txt
    path: ./ruleset/reject-list.txt
  fake-ip-filter:
    <<: *domain_rule
    url: https://cdn.jsdelivr.net/gh/juewuy/ShellCrash@dev/public/fake_ip_filter.list
    path: ./ruleset/fake_ip_filter.list

rules:
  - DOMAIN-SUFFIX,steamserver.net,DIRECT

  ##### 域名匹配 #####
  - GEOSITE,private,DIRECT
  - RULE-SET,reject-list,REJECT
  - GEOSITE,category-ai-!cn,🤖 AIGC
  - GEOSITE,category-pt,DIRECT
  - GEOSITE,category-public-tracker,DIRECT
  - GEOSITE,category-number-verification-cn,DIRECT
  - GEOSITE,category-speedtest,🚀 General
  - GEOSITE,geolocation-!cn@cn,DIRECT
  - GEOSITE,geolocation-!cn,🚀 General
  - GEOSITE,geolocation-cn@!cn,🚀 General
  - GEOSITE,geolocation-cn,DIRECT
  - GEOSITE,tld-cn,DIRECT

  ##### IP 匹配 #####
  - GEOIP,telegram,PROXY,no-resolve
  - GEOIP,lan,DIRECT
  - GEOIP,cn,DIRECT
  - NOT,((DST-PORT,80/443/8080/8888)),🚀 General
  - MATCH,🚀 General
